name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review, review_requested]
  issue_comment:
    types: [created, edited]

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' && (github.event_name != 'issue_comment' || github.event.issue.pull_request) }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    name: Review pull requests with PR-Agent
    steps:
      - name: PR Agent action step
        id: pragent
        uses: L0stInFades/pr-agent@minimax-m3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMAX.KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX.API_BASE: "https://api.minimax.io/v1"
          MINIMAX.REASONING_SPLIT: "true"
          MINIMAX.THINKING: "adaptive"
          MINIMAX.MAX_COMPLETION_TOKENS: "32768"
          config.model: "minimax/MiniMax-M3"
          config.fallback_models: "[]"
          config.max_model_tokens: "1000000"
          config.custom_model_max_tokens: "1000000"
          config.model_token_count_estimate_factor: "0"
          config.ai_timeout: "600"
          config.temperature: "0.2"
          config.log_level: "INFO"
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
          github_action_config.pr_actions: '["opened", "reopened", "ready_for_review", "review_requested"]'
